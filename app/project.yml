name: OpenAdaptiveSwitch
options:
  bundleIdPrefix: com.mikavj
  deploymentTarget:
    iOS: "17.0"
packages:
  NordicDFU:
    url: https://github.com/NordicSemiconductor/IOS-DFU-Library
    from: 4.16.0
targets:
  OpenAdaptiveSwitch:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NordicDFU
        product: NordicDFU
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: OA Switch
        NSBluetoothAlwaysUsageDescription: >-
          This app connects to your Open Adaptive Switch over Bluetooth to
          change its settings and install firmware updates.
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikavj.openadaptiveswitch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
