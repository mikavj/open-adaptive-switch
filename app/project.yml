name: OpenAdaptiveSwitch
options:
  bundleIdPrefix: com.mikavj
  deploymentTarget:
    iOS: "17.0"
packages:
  NordicDFU:
    url: https://github.com/NordicSemiconductor/IOS-DFU-Library
    from: 4.16.0
targets:
  OpenAdaptiveSwitch:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: NordicDFU
        product: NordicDFU
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: OA Switch
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "2"
        NSBluetoothAlwaysUsageDescription: >-
          This app connects to your Open Adaptive Switch over Bluetooth to
          change its settings and install firmware updates.
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikavj.openadaptiveswitch
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        # Xcode wrote these into the generated project after 1.0 shipped;
        # carrying them here keeps regeneration from dropping them (the
        # team id in particular - archiving fails without it).
        DEVELOPMENT_TEAM: NA3CQULNCM
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        STRING_CATALOG_GENERATE_SYMBOLS: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
